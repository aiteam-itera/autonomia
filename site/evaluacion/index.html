<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Diagnóstico de IA — AutonomIA</title>
    <meta
      name="description"
      content="Haz tu Diagnóstico de IA en 5 minutos y recibe un plan de siguientes pasos personalizado."
    />
    <!-- /evaluacion/ is the public-facing entry URL used in outbound and content
         CTAs; the live diagnostic is /cuestionario.html. Canonical points there
         and crawlers are told not to index this shim. -->
    <meta name="robots" content="noindex,follow" />
    <link rel="canonical" href="https://ia.itera.es/cuestionario.html" />
    <meta http-equiv="refresh" content="0; url=/cuestionario.html" />
    <script src="/assets/analytics.js" defer></script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
        background: #0b1f3a;
        color: #e8eef6;
      }
      a { color: #7db1ff; }
      .box { text-align: center; padding: 24px; max-width: 28rem; }
    </style>
    <script>
      // Forward to the live diagnostic, preserving query string (UTM) and hash
      // so outbound/campaign attribution survives the redirect.
      (function () {
        var dest = "/cuestionario.html" + window.location.search + window.location.hash;
        try {
          window.autonomia && window.autonomia.track("evaluacion_redirect");
        } catch (e) {}
        window.location.replace(dest);
      })();
    </script>
  </head>
  <body>
    <div class="box">
      <p>Abriendo tu Diagnóstico de IA…</p>
      <p>Si no se abre automáticamente,
        <a href="/cuestionario.html">haz clic aquí</a>.</p>
    </div>
  </body>
</html>

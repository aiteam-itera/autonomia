name = "autonomia-api"
main = "src/index.ts"
compatibility_date = "2026-05-01"
workers_dev = true

# Public-by-default vars (override with `wrangler secret put` for sensitive ones).
[vars]
PUBLIC_URL = "https://autonomia.itera.es"
EMAIL_FROM = "AutonomIA <onboarding@resend.dev>"
LLM_MODEL = "claude-haiku-4-5-20251001"
LLM_MAX_TOKENS = "800"
DAILY_LLM_LIMIT = "200"

# KV namespace. Create with:
#   npx wrangler kv:namespace create AUTONOMIA_KV
# Then paste the returned `id` here.
[[kv_namespaces]]
binding = "AUTONOMIA_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Secrets (NOT defined here — use `wrangler secret put`):
#   ANTHROPIC_API_KEY
#   RESEND_API_KEY
